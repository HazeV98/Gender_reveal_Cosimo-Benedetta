<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel o Victoria?</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @font-face {
            font-family: 'SaintOmbre';
            src: url('La-Monarchie-de-Saint-Ombre.woff') format('woff');
            font-display: swap;
        }

        :root {
            /* Sfondi pastello per lo schermo intero */
            --blue: #a2d2ff;
            --pink: #ffc8dd;
            /* Colori molto più intensi per i bottoni per far risaltare il bianco */
            --blue-dark: #4895ef; 
            --pink-dark: #f72585; 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* Sfondo Split */
        .split-bg {
            position: fixed; inset: 0; display: flex; z-index: -1;
            transition: all 1s ease-in-out;
        }
        .bg-left { flex: 1; background: var(--blue); transition: flex 1s ease-in-out, background 1s; }
        .bg-right { flex: 1; background: var(--pink); transition: flex 1s ease-in-out; }

        /* Schermata Iniziale */
        #welcome-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Timer UI BIANCO */
        #timer-container {
            margin-top: 30px; min-height: 120px;
            display: flex; justify-content: center; align-items: center;
        }
        .timer-big { 
            font-size: 8rem; color: #ffffff; line-height: 1; font-weight: bold;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3); 
        }
        .timer-normal { 
            font-size: 2.8rem; display: flex; gap: 15px; justify-content: center; 
            color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .timer-normal span { font-weight: 900; }
        .timer-normal small { 
            font-size: 1rem; display: block; color: #ffffff; 
            text-transform: uppercase; font-weight: bold; opacity: 0.9;
        }

        /* Sezione Voti */
        .vote-section { padding: 15px; text-align: center; margin-top: 10px; }
        .vote-title {
            background: rgba(255,255,255,0.95); display: inline-block; 
            padding: 10px 25px; border-radius: 20px; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        
        .btns-container { 
            display: flex; justify-content: space-around; margin-top: 25px; width: 100%; max-width: 600px; margin-inline: auto;
        }
        .vote-card { width: 45%; }
        
        /* BOTTONI AGGIORNATI PER FAR RISALTARE IL BIANCO */
        .btn-voto {
            width: 100%; padding: 20px 10px; border: none; border-radius: 15px;
            font-size: 1.4rem; font-weight: 900; letter-spacing: 1px;
            color: #ffffff; /* Testo forzatamente bianco */
            text-shadow: 0 2px 5px rgba(0,0,0,0.3); /* Ombra per staccare il testo dallo sfondo */
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); transition: all 0.2s;
        }
        .btn-voto:active { transform: scale(0.95); }
        .btn-gabriel { background: var(--blue-dark); }
        .btn-victoria { background: var(--pink-dark); }
        
        .btn-start { background: #333; color: white; width: auto; padding: 15px 40px; text-shadow: none; font-size: 1.2rem; }

        /* Barre di Progresso */
        .progress-container { 
            background: rgba(255,255,255,0.8); border-radius: 10px; 
            margin-top: 15px; height: 16px; overflow: hidden; box-shadow: inset 0 1px 4px rgba(0,0,0,0.1);
        }
        .progress-bar { height: 100%; width: 50%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-blue { background: var(--blue-dark); }
        .bar-pink { background: var(--pink-dark); }
        .percent-text { font-weight: bold; color: #333; font-size: 1.2rem; margin-top: 5px; display: block; }

        /* Tasto Lista Nascita Amazon */
        .amazon-link {
            position: fixed; bottom: 25px; right: 25px; font-size: 2.2rem;
            text-decoration: none; background: white; padding: 12px; border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); transition: transform 0.2s;
            display: flex; justify-content: center; align-items: center; z-index: 50;
        }
        .amazon-link:hover { transform: scale(1.1); }
        
        .debug-btn {
            position: fixed; bottom: 20px; left: 20px; opacity: 0.05;
            background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 50;
        }

        /* Reveal Finale */
        #reveal-ui { display: none; width: 100%; text-align: center; position: absolute; top: 10%; left: 0; right: 0; }
        
        #reveal-name {
            font-family: 'SaintOmbre', serif; 
            font-size: 6.5rem; 
            color: #ffffff; 
            opacity: 0; 
            margin-top: -250px; 
            transition: opacity 1.5s ease-in;
            text-shadow: 2px 4px 20px rgba(0,0,0,0.4); 
            position: relative; 
            z-index: 999; 
            display: block;
        }
        
        #lottie-pacco { position: relative; z-index: 1; }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-box">
            <h1 style="margin-top: 0; color: #333;">Scopri se sarà<br>Gabriel o Victoria</h1>
            <button class="btn-voto btn-start" onclick="startApp()">SCOPRI</button>
        </div>
    </div>

    <div class="split-bg" id="main-bg">
        <div class="bg-left" id="bg-blue"></div>
        <div class="bg-right" id="bg-pink"></div>
    </div>

    <div id="content-ui">
        <div id="timer-container">
            <div id="timer-val" class="timer-normal">Caricamento...</div>
        </div>

        <div class="vote-section">
            <h3 class="vote-title">Vota se secondo te sarà:</h3>
            
            <div class="btns-container">
                <div class="vote-card">
                    <button id="btn-gabriel" class="btn-voto btn-gabriel" onclick="vota('gabriel')">GABRIEL</button>
                    <div class="progress-container"><div id="bar-gabriel" class="progress-bar bar-blue"></div></div>
                    <small id="percent-gabriel" class="percent-text">0%</small>
                </div>
                <div class="vote-card">
                    <button id="btn-victoria" class="btn-voto btn-victoria" onclick="vota('victoria')">VICTORIA</button>
                    <div class="progress-container"><div id="bar-victoria" class="progress-bar bar-pink"></div></div>
                    <small id="percent-victoria" class="percent-text">0%</small>
                </div>
            </div>
        </div>
    </div>

    <div id="reveal-ui">
        <div id="lottie-pacco" style="width: 100%; max-width: 450px; margin: 0 auto;"></div>
        <h1 id="reveal-name">Gabriel</h1>
    </div>

    <a href="https://www.amazon.it/baby-reg/benedetta-parmesan-ottobre-2026-venezia/1MJ3B3ETJ2BFC" target="_blank" class="amazon-link">🎁</a>
    
    <button class="debug-btn" onclick="triggerTest()">Test 10s</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbJ06QOQQXPBfQ9rJtWJonV1ce6aeAZM0",
            authDomain: "gender-reveal-cosimo.firebaseapp.com",
            projectId: "gender-reveal-cosimo",
            storageBucket: "gender-reveal-cosimo.firebasestorage.app",
            messagingSenderId: "805866691300",
            appId: "1:805866691300:web:1308b8fbf8c796511c2af1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let targetTime = new Date("2026-05-02T18:00:00+02:00").getTime();
        let isRevealed = false;

        function controllaStatoVoto() {
            if (localStorage.getItem("voto_registrato")) {
                document.getElementById("btn-gabriel").disabled = true;
                document.getElementById("btn-victoria").disabled = true;
                document.getElementById("btn-gabriel").style.opacity = "0.5";
                document.getElementById("btn-victoria").style.opacity = "0.5";
            }
        }

        window.vota = async (scelta) => {
            if (localStorage.getItem("voto_registrato")) {
                alert("Hai già espresso il tuo voto! ⏳");
                return;
            }
            localStorage.setItem("voto_registrato", "true");
            controllaStatoVoto();
            document.getElementById(`btn-${scelta}`).innerText = "VOTATO ✔";
            document.getElementById(`btn-${scelta}`).style.opacity = "1";
            await updateDoc(doc(db, "votes", "summary"), { [scelta]: increment(1) });
        };

        onSnapshot(doc(db, "votes", "summary"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const gV = data.gabriel || 0;
                const vV = data.victoria || 0;
                const total = gV + vV;
                let pG = 50, pV = 50, tG = "0%", tV = "0%";
                if (total > 0) {
                    pG = Math.round((gV / total) * 100);
                    pV = 100 - pG;
                    tG = pG + "%"; tV = pV + "%";
                }
                document.getElementById('bar-gabriel').style.width = pG + '%';
                document.getElementById('bar-victoria').style.width = pV + '%';
                document.getElementById('percent-gabriel').innerText = tG;
                document.getElementById('percent-victoria').innerText = tV;
            }
        });

        const timerLoop = setInterval(() => {
            const diff = targetTime - new Date().getTime();
            if (diff <= 0 && !isRevealed) {
                clearInterval(timerLoop);
                doReveal();
                return;
            }
            updateTimerUI(diff);
        }, 1000);

        function updateTimerUI(diff) {
            const d = Math.floor(diff / 864e5), h = Math.floor((diff % 864e5) / 36e5), m = Math.floor((diff % 36e5) / 6e4), s = Math.floor((diff % 6e4) / 1000);
            if (d <= 0 && h <= 0 && m <= 0) {
                const el = document.getElementById('timer-val');
                el.className = "timer-big"; el.innerText = s;
                if (s <= 5 && s > 0 && navigator.vibrate) navigator.vibrate(300);
            } else {
                let html = "";
                if (d > 0) html += `<div><span>${d}</span><small>giorni</small></div>:`;
                if (h > 0 || d > 0) html += `<div><span>${h}</span><small>ore</small></div>:`;
                html += `<div><span>${m}</span><small>min</small></div>:<div><span>${s}</span><small>sec</small></div>`;
                document.getElementById('timer-val').innerHTML = html;
            }
        }

        function doReveal() {
            isRevealed = true;
            document.getElementById('content-ui').style.display = 'none';
            document.getElementById('reveal-ui').style.display = 'block';
            document.getElementById('bg-pink').style.flex = "0";
            
            // Colore finale più azzurro intenso che si ricollega al bottone
            document.getElementById('bg-blue').style.background = "#4895ef";

            bodymovin.loadAnimation({
                container: document.getElementById('lottie-pacco'),
                path: 'Register User.json',
                renderer: 'svg', loop: false, autoplay: true
            });

            setTimeout(() => {
                document.getElementById('reveal-name').style.opacity = "1";
                confetti({ 
                    particleCount: 350, spread: 120, origin: { y: 0.6 }, 
                    colors: ['#ffffff', '#89CFF0', '#007bff'], zIndex: 2000
                });
            }, 2500); 
        }

        window.startApp = async () => {
            document.getElementById('welcome-overlay').style.display = 'none';
            controllaStatoVoto();
            const ref = doc(db, "votes", "summary");
            const snap = await getDoc(ref);
            if (!snap.exists()) await setDoc(ref, { gabriel: 0, victoria: 0 });
        };

        window.triggerTest = () => { targetTime = new Date().getTime() + 11000; };
    </script>
</body>
</html>
